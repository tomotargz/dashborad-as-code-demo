name: Dashboard as Code CI/CD

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'dashboards/**.json'
  push:
    branches:
      - main
    paths:
      - 'dashboards/**.json'

jobs:
  deploy-dashboard:
    # ローカルのセルフホストランナーで実行
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y jq curl

      - name: Process and Deploy Dashboard
        env:
          GRAFANA_URL: "http://grafana:3000" # Dockerネットワーク内の名前解決
          GRAFANA_API_KEY: ${{ secrets.GRAFANA_API_KEY }}
        run: |
          # 変更されたJSONファイルを特定
          DASHBOARD_FILE=$(ls dashboards/*.json | head -n 1)
          
          if [ -z "$DASHBOARD_FILE" ]; then
            echo "No dashboard file found."
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUM=${{ github.event.pull_request.number }}
            # PR用: titleに[Review-PR#X]を付与, uidに -pr{番号} を付与, 読み取り専用化
            NEW_DASHBOARD=$(jq ".title = \"[Review-PR#${PR_NUM}] \" + .title | .id = null | .uid = .uid + \"-pr${PR_NUM}\" | .editable = false" $DASHBOARD_FILE)
            PAYLOAD=$(echo "$NEW_DASHBOARD" | jq '{dashboard: ., overwrite: true}')
          else
            # 本番用(main): titleに[Prod]を付与, uidに -prod を付与, 読み取り専用化
            NEW_DASHBOARD=$(jq ".title = \"[Prod] \" + .title | .id = null | .uid = .uid + \"-prod\" | .editable = false" $DASHBOARD_FILE)
            PAYLOAD=$(echo "$NEW_DASHBOARD" | jq '{dashboard: ., overwrite: true}')
          fi

          # Grafana API へポスト
          HTTP_STATUS=$(curl -sS -o api_response.txt -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $GRAFANA_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            $GRAFANA_URL/api/dashboards/db)

          # レスポンス内容をログに表示
          echo "Grafana API Response:"
          cat api_response.txt

          # ステータスコードが200番台以外ならエラー
          if [[ "$HTTP_STATUS" != 20* ]]; then
            echo "::error::Grafana API request failed with status $HTTP_STATUS"
            exit 1
          fi           $GRAFANA_URL/api/dashboards/db
